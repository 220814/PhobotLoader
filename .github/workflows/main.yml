name: pingbypassLoader-1.21.1

on:
  workflow_dispatch: 
  push:
    branches:
      - main  
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build jar --no-daemon

      - name: Prepare Artifacts
        run: |
          mkdir -p output
          find . -path "*/build/libs/*.jar" -exec cp {} output/ \;
          ls -R output/

      - name: pingbypass artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pingbypass-All-Jars
          path: output/
          if-no-files-found: error
          
